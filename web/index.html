<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#0d0f1a">
  <meta name="description" content="CLOBI CRAFT: a fully 3D voxel sandbox in your browser. Mine, build, and dress your blocky self with Minecraft-compatible skins, an in-game skin studio, and an always-free community skin marketplace. A tribute to Clobi: vim, Linux, and Fisherman's Friend forever.">
  <title>CLOBI CRAFT · 3D Voxel Sandbox &amp; Skin Marketplace</title>

  <!-- ============================================================= -->
  <!-- PWA / installable app (Android TWA + iOS home-screen).        -->
  <!-- The manifest drives Android install + the TWA; the apple-*    -->
  <!-- meta tags below give iOS the same standalone, full-screen,    -->
  <!-- home-screen-launch behaviour (iOS ignores the manifest for    -->
  <!-- display/icon, so it needs its own tags).                      -->
  <!-- ============================================================= -->
  <link rel="manifest" href="/manifest.webmanifest">
  <link rel="icon" href="/favicon.ico" sizes="any">
  <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png">
  <!-- iOS: run full-screen from the home screen, dark status bar -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="CLOBI CRAFT">
  <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png">
  <link rel="apple-touch-icon" sizes="152x152" href="/icons/icon-152.png">
  <link rel="apple-touch-icon" sizes="167x167" href="/icons/icon-167.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/icons/icon-180.png">

  <!-- Fonts: Press Start 2P for DISPLAY (titles/nav/buttons), VT323 for readable body copy. -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- ============================================================= -->
  <!-- SCREEN: MENU  (rendered/populated by menu.js)                 -->
  <!-- ============================================================= -->
  <div id="screen-menu" class="screen active"></div>

  <!-- ============================================================= -->
  <!-- SCREEN: GAME — the 3D voxel world.                            -->
  <!-- game.js/renderer.js draw into #game-canvas; hud.js owns every -->
  <!-- piece of DOM UI inside #hud-root (crosshair, hotbar, chat…).  -->
  <!-- ============================================================= -->
  <div id="screen-game" class="screen">
    <canvas id="game-canvas"></canvas>
    <div id="hud-root"></div>
  </div>

  <!-- ============================================================= -->
  <!-- SCREEN: SKIN STUDIO  (rendered/populated by skinstudio.js)    -->
  <!-- ============================================================= -->
  <div id="screen-studio" class="screen"></div>

  <!-- ============================================================= -->
  <!-- SCREEN: WARDROBE — the player's skin library (owned by menu.js) -->
  <!-- ============================================================= -->
  <div id="screen-wardrobe" class="screen"></div>

  <!-- ============================================================= -->
  <!-- SCREEN: MARKET  (rendered/populated by market.js)             -->
  <!-- ============================================================= -->
  <div id="screen-market" class="screen"></div>

  <!-- ============================================================= -->
  <!-- SCREEN: WORLDS — "Select World" (Part II, rendered/populated  -->
  <!-- by worldselect.js): My Worlds + Join a Game tabs.             -->
  <!-- ============================================================= -->
  <div id="screen-worlds" class="screen"></div>

  <!-- ============================================================= -->
  <!-- ACTIVATE WINDOWS GAG OVERLAY (populated by gag.js)            -->
  <!-- Always on top, outside the screens, ignores pointer events.   -->
  <!-- ============================================================= -->
  <div id="gag-overlay" aria-hidden="true"></div>

  <!-- ============================================================= -->
  <!-- MODAL ROOT (account + language + wardrobe popups)             -->
  <!-- ============================================================= -->
  <div id="modal-root"></div>

  <!-- ============================================================= -->
  <!-- SCRIPTS — exact dependency load order per                     -->
  <!-- docs/ARCHITECTURE-3D.md §2 (Part I) and docs/ARCHITECTURE-MP.md -->
  <!-- §4 (Part II: net.js/remoteplayers.js after game.js;           -->
  <!-- worldselect.js/friends.js before menu.js). Each file assigns  -->
  <!-- ONE global.                                                   -->
  <!-- ============================================================= -->
  <script src="js/i18n.js"></script>
  <script src="js/gag.js"></script>
  <script src="js/sound.js"></script>
  <script src="js/store.js"></script>
  <script src="js/vox/math3d.js"></script>
  <script src="js/vox/glx.js"></script>
  <script src="js/vox/lut.js"></script>
  <script src="js/vox/blocks.js"></script>
  <script src="js/vox/items.js"></script>
  <script src="js/vox/worldgen.js"></script>
  <script src="js/vox/world.js"></script>
  <script src="js/vox/mesher.js"></script>
  <script src="js/vox/skins.js"></script>
  <script src="js/vox/playermodel.js"></script>
  <script src="js/vox/physics.js"></script>
  <script src="js/vox/input.js"></script>
  <script src="js/vox/interact.js"></script>
  <script src="js/vox/inventory.js"></script>
  <script src="js/vox/craft.js"></script>
  <script src="js/vox/commands.js"></script>
  <script src="js/vox/hud.js"></script>
  <script src="js/vox/renderer.js"></script>
  <script src="js/vox/net.js"></script>
  <script src="js/vox/remoteplayers.js"></script>
  <script src="js/vox/combat.js"></script>
  <script src="js/vox/mobs.js"></script>
  <script src="js/vox/drops.js"></script>
  <script src="js/vox/game.js"></script>
  <script src="js/skinstudio.js"></script>
  <script src="js/market.js"></script>
  <script src="js/worldselect.js"></script>
  <script src="js/friends.js"></script>
  <script src="js/menu.js"></script>
  <script src="js/main.js"></script>

  <!-- ============================================================= -->
  <!-- Service worker registration (PWA offline shell + fast loads). -->
  <!-- Registered AFTER the app boots so it never delays first paint; -->
  <!-- silently no-ops where unsupported (old browsers, http origin).-->
  <!-- ============================================================= -->
  <script>
    (function () {
      if (!('serviceWorker' in navigator)) return;
      // Only over secure contexts (https / localhost). file:// and plain http
      // (other than localhost) can't host a SW — skip quietly.
      if (!window.isSecureContext) return;
      window.addEventListener('load', function () {
        navigator.serviceWorker.register('/sw.js').then(function (reg) {
          // When a new SW is found and installed while one already controls the
          // page, activate it on next load automatically (skipWaiting in sw.js
          // + reload-on-controllerchange keeps clients on the newest shell).
          reg.addEventListener('updatefound', function () {
            var nw = reg.installing;
            if (!nw) return;
            nw.addEventListener('statechange', function () {
              if (nw.state === 'installed' && navigator.serviceWorker.controller) {
                nw.postMessage && reg.waiting && reg.waiting.postMessage('skipWaiting');
              }
            });
          });
        }).catch(function () { /* registration is best-effort */ });

        var refreshing = false;
        navigator.serviceWorker.addEventListener('controllerchange', function () {
          if (refreshing) return;
          refreshing = true;
          window.location.reload();
        });
      });
    })();
  </script>
</body>
</html>
